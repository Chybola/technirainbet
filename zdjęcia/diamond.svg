<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#aee4ff" />
      <stop offset="60%" stop-color="#42a5f5" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feComposite operator="in" in2="SourceGraphic" />
      <feBlend in="SourceGraphic" mode="overlay" />
    </filter>
    <radialGradient id="shine" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- diamond shape composed of facets -->
  <g transform="translate(100,100)">
    <polygon points="0,-70 55,-10 0,70 -55,-10" fill="url(#g1)" stroke="#0b3d66" stroke-width="2" />
    <!-- facets -->
    <polygon points="0,-70 0,70 55,-10" fill="#6fbff7" opacity="0.35" />
    <polygon points="0,-70 -55,-10 0,70" fill="#88d4ff" opacity="0.25" />
    <polygon points="55,-10 0,70 0,30" fill="#bde9ff" opacity="0.12" />
    <!-- shine overlay -->
    <ellipse cx="-20" cy="-35" rx="60" ry="40" fill="url(#shine)" />
    <!-- subtle textured overlay using low-opacity polygons -->
    <g opacity="0.06" fill="#ffffff">
      <polygon points="0,-70 20,-30 0,-10" />
      <polygon points="-10,10 10,30 0,50" />
    </g>
  </g>
</svg>
